<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Session Report</title>
  <style>
    body { font-family: Arial, sans-serif; margin: 40px; line-height: 1.6; }
    h1 { color: #1a73e8; }
    .summary { background: #f8f9fa; padding: 15px; border-radius: 8px; margin-bottom: 20px; }
    .message { margin: 15px 0; padding: 12px; border-radius: 8px; }
    .user { background: #e3f2fd; border-left: 4px solid #1a73e8; }
    .assistant { background: #f5f5f5; border-left: 4px solid #34a853; }
  </style>
</head>
<body>
  <h1>AI Session Report</h1>
  <p><strong>Date:</strong> {{ date }}</p>

  {% if summary %}
  <div class="summary">
    <h2>Executive Summary</h2>
    <p>{{ summary }}</p>
  </div>
  {% endif %}

  <h2>Full Conversation</h2>
  {% for msg in messages %}
    <div class="message {{ 'user' if msg.role == 'user' else 'assistant' }}">
      <strong>{{ msg.role|capitalize }}:</strong> {{ msg.content }}
    </div>
  {% endfor %}

  <hr>
  <p style="text-align: center; font-size: 0.9em;">Generated by Session PDF Agent – Powered by Google ADK</p>
</body>
</html>
